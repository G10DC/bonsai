name: ci
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}' }
      # zero-dep: tests + coverage + harness smoke run on Node built-ins alone
      - run: node --test tests/*.test.mjs
      - run: node --test --experimental-test-coverage tests/*.test.mjs
      - run: node scripts/benchmark.mjs --json >/dev/null   # harness structure smoke

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm install -g eslint@9
      - run: eslint scripts tests
